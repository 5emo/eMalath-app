<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor | Visit Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
       if ('serviceWorker' in navigator) {
       navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"));
       }
    </script>
    <style>
        body { background: #f4f7fe; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .doc-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-success { background-color: #10b981; border: none; font-weight: bold; }
        .phone-link { color: #4f46e5; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="row mb-4 align-items-center">
            <div class="col-12 col-md-6">
                <h2 class="fw-bold text-primary">Staff Visit Portal</h2>
            </div>
            <div class="col-12 col-md-6">
                <div class="d-flex gap-2">
                    <select id="staffFilter" class="form-select shadow-sm" onchange="render()">
                        <option value="Dr. Ali (Specialist)">Dr. Ali (Specialist)</option>
                        <option value="Nurse Mona (General)">Nurse Mona (General)</option>
                        <option value="Dr. Samer (Specialist)">Dr. Samer (Specialist)</option>
                        <option value="Nurse Rami (General)">Nurse Rami (General)</option>
                    </select>
                    <button class="btn btn-outline-primary" onclick="render()">🔄</button>
                </div>
            </div>
        </div>

        <div id="taskList"></div>
    </div>
    <script src="Language/translation.js"></script>
    <script src="Language/lang.js"></script>
    <script>
        function render() {
            const list = document.getElementById('taskList');
            const selectedStaff = document.getElementById('staffFilter').value;
            let users = JSON.parse(localStorage.getItem('adv_users')) || [];
            list.innerHTML = "";

            const myTasks = users.filter(u => 
                u.appointment && 
                u.appointment.staffName === selectedStaff && 
                !u.appointment.doctorDone
            );

            myTasks.forEach(u => {
                const card = document.createElement('div');
                card.className = "card doc-card p-4 shadow-sm";
                card.innerHTML = `
                    <div class="d-flex justify-content-between mb-2">
                        <h5 class="fw-bold mb-0">${u.fullName}</h5>
                        <span class="badge bg-info">${u.serviceTier.toUpperCase()}</span>
                    </div>
                    
                    <p class="mb-2">
                        <strong>📞 Phone:</strong> 
                        <a href="tel:${u.phone}" class="phone-link">${u.phone}</a>
                    </p>

                    <p class="text-muted small mb-2">
                        <strong>Patient Address:</strong> ${u.locationDesc}
                    </p>
                    
                    <button class="btn btn-sm btn-link text-decoration-none p-0 mb-3 fw-bold" onclick="alert('Accessing Records for: ${u.fileName}')">
                        📄 Open Medical Report
                    </button>
                    
                    <div class="bg-light p-3 rounded mb-3 border-start border-4 border-primary">
                        <p class="mb-1"><strong>Scheduled Date:</strong> ${u.appointment.date}</p>
                        <p class="mb-0"><strong>Arrival Time:</strong> ${u.appointment.time}</p>
                    </div>
                    
                    <button class="btn btn-success w-100 py-2 shadow-sm" onclick="markDone(${u.id})">
                        Mark Visit as Finished
                    </button>
                `;
                list.appendChild(card);
            });

            if(myTasks.length === 0) {
                list.innerHTML = `
                    <div class="text-center mt-5 py-5 border rounded bg-white">
                        <h5 class="text-muted">No pending visits for ${selectedStaff}</h5>
                    </div>`;
            }
        }

        function markDone(id) {
            let users = JSON.parse(localStorage.getItem('adv_users'));
            const idx = users.findIndex(u => u.id === id);
            users[idx].appointment.doctorDone = true; 
            localStorage.setItem('adv_users', JSON.stringify(users));
            alert("Visit status updated!");
            render();
        }

        render();
        //LANGUAGE
        function updateLanguage() {
            const lang = localStorage.getItem("lang") || "en";
            const isArabic = lang === "ar";

            document.body.dir = isArabic ? "rtl" : "ltr";

            for(const id in translations){
                const el = document.getElementById(id);
                if(el) el.textContent = isArabic ? translations[id].ar : translations[id].en;
            }
        }

        document.addEventListener("DOMContentLoaded", updateLanguage);
        window.addEventListener("storage", (e) => {
            if(e.key === "lang") updateLanguage();
        });
    </script>
</body>
</html>
