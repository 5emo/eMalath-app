<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedTrack Pro</title>
    <link rel="manifest" href="manifest.json">
    <script>
       if ('serviceWorker' in navigator) {
       navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"));
       }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #4f46e5;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }

        .admin-link {
            font-size: 0.8rem;
            color: #64748b;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
        .admin-link:hover {
            font-size: 0.8rem;
            background-color: white;
            color: #4f46e5;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
        .logBut {
            text-decoration: none;
            border: none;
            background-color: white;
            color: #64748b;
            font-size: 0.8rem;

        }
        .logBut:hover {
            text-decoration: none;
            border: none;
            background-color: white;
            color: #4f46e5;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <img src="pictures/logo.png" alt="eMalath logo" style="width: 100px; border-radius: 27px;">
            <h4 style="margin-top: 5px;">eMalath</h4>
        </div>
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark" id="login-welcome">Welcome</h3>
            <p class="text-muted small" id="login-subtitle">Access your medical dashboard</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold" id="label-email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold" id="label-pass">Password</label>
                <input type="password" id="pass" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="btn-signin">Sign In</button>

            <div class="text-center">
                <span class="small text-muted" id="txt-new-patient">New patient?</span>
                <a href="signup.html" class="small fw-bold text-decoration-none" id="link-signup">Create Account</a>
            </div>


            <div class="settings-card d-flex flex-column align-items-center justify-content-center" style="margin-top: 30px;">
                <div style="display: inline-flex;">
                    <h6 class="fw-bold mb-2" id="txt-lang-en" style="font-size: 0.8rem; color: #64748b; margin-left: 5px; margin-right: 5px;">LANGUAGE</h6>
                    <h6 class="fw-bold mb-2" style="font-size: 0.8rem; color: #64748b; margin-left: 5px; margin-right: 5px;">|</h6>
                    <h6 class="fw-bold mb-2" id="txt-lang-ar" style="font-size: 0.8rem; color: #64748b; margin-left: 5px; margin-right: 5px;">اللغة</h6>
                </div>
                <div class="lang-buttons" style="display: inline-flex;">
                    <button id="btn-ar" class="logBut">العربية</button>
                    <h4 style="margin-left: 5px; margin-right: 5px; color: #64748b; font-size: 0.8rem;"> | </h4>
                    <button id="btn-en" class="logBut">English</button>
                </div>
            </div>
            <hr class="my-3">
            <div class="d-flex justify-content-around">
                <a href="admin.html" class="admin-link" id="link-admin">Main Admin</a>
                <a href="hospital.html" class="admin-link" id="link-hospital">Hospital Admin</a>
                <a href="staff.html" class="admin-link" id="link-medics">Medics</a>
            </div>
        </form>
    </div>
    <script src="Language/translation.js"></script>
    <script src="Language/lang.js"></script>
    <script>
        // Language switching logic for Login page
        const btnAr = document.getElementById("btn-ar");
        const btnEn = document.getElementById("btn-en");

        if (btnAr) {
            btnAr.onclick = (e) => {
                e.preventDefault();
                localStorage.setItem("lang", "ar");
                location.reload();
            };
        }
        if (btnEn) {
            btnEn.onclick = (e) => {
                e.preventDefault();
                localStorage.setItem("lang", "en");
                location.reload();
            };
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            if (email === "admin@system.com" && password === "admin123") {
                window.location.href = "admin.html";
                return;
            }
            if (email === "hospital@system.com" && password === "hosp123") {
                window.location.href = "hospital.html";
                return;
            }

            let users = JSON.parse(localStorage.getItem('adv_users')) || [];
            const user = users.find(u => u.email === email && u.pass === password);

            if (user) {
                localStorage.setItem('currentUserEmail', email);
                window.location.href = "care_hub.html";
            } else {
                alert("Invalid email or password. Please try again.");
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
